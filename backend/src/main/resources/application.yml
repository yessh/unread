spring:
  application:
    name: unread

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/unread
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    show-sql: false
    open-in-view: false

  # Security Configuration
  security:
    jwt:
      secret: ${JWT_SECRET:your-secret-key-must-be-at-least-32-characters-long}
      expiration: 86400000 # 24 hours in milliseconds
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile

  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
      adjust-dates-to-context-time-zone: false
    time-zone: UTC

  # Spring AI - Gemini via OpenAI-compatible endpoint
  ai:
    openai:
      api-key: ${GEMINI_API_KEY:your-gemini-api-key}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        options:
          model: gemini-2.5-flash
      embedding:
        options:
          model: text-embedding-004

# App Configuration
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    max-http-form-post-size: -1
    max-swallow-size: -1

# Logging Configuration
logging:
  level:
    root: INFO
    com.kakao.chatsummary: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
